{# ── "Check now" toast + fetch logic ─────────────────────────────────────────
   Include once per page (inside {% block scripts %}).
   Works for any button rendered as:
     <button onclick="checkNow(this, '<url>')">Check now</button>
#}
<style>
  #check-toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    min-width: 280px;
    max-width: 380px;
    padding: .85rem 1.1rem;
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    font-size: .9rem;
    line-height: 1.45;
    display: flex;
    align-items: flex-start;
    gap: .65rem;
    z-index: 9999;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .2s ease, transform .2s ease;
    pointer-events: none;
  }
  #check-toast.toast-visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  #check-toast.toast-checking { background: #1e293b; color: #f1f5f9; }
  #check-toast.toast-success  { background: #f0fdf4; color: #14532d; border: 1px solid #bbf7d0; }
  #check-toast.toast-none     { background: #f9fafb; color: #374151; border: 1px solid #e5e7eb; }
  #check-toast.toast-error    { background: #fef2f2; color: #7f1d1d; border: 1px solid #fca5a5; }
  .toast-icon { flex-shrink: 0; margin-top: .05rem; }
  .toast-body { flex: 1; }
  .toast-title { font-weight: 600; }
  .toast-sub   { font-size: .82rem; margin-top: .15rem; opacity: .8; }
</style>

{# Toast element — rendered once, reused by all Check now buttons on the page #}
<div id="check-toast" role="status" aria-live="polite"></div>

<script>
(function () {
  const toast = document.getElementById('check-toast');
  let _hideTimer = null;

  function showToast(state, title, sub) {
    clearTimeout(_hideTimer);
    toast.className = 'toast-visible toast-' + state;

    const icons = {
      checking: `<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                   <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                 </svg>`,
      success:  `<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                   <polyline points="20 6 9 17 4 12"/>
                 </svg>`,
      none:     `<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                   <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                 </svg>`,
      error:    `<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                   <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                 </svg>`,
    };

    toast.innerHTML =
      (icons[state] || '') +
      `<div class="toast-body">
         <div class="toast-title">${title}</div>
         ${sub ? `<div class="toast-sub">${sub}</div>` : ''}
       </div>`;

    // Auto-hide non-checking toasts after 4 s (unless we're about to reload)
    if (state !== 'checking') {
      _hideTimer = setTimeout(hideToast, 4000);
    }
  }

  function hideToast() {
    toast.classList.remove('toast-visible');
  }

  // Spin the icon while in "checking" state
  const style = document.createElement('style');
  style.textContent = '.toast-checking svg { animation: toast-spin 1s linear infinite; } @keyframes toast-spin { to { transform: rotate(360deg); } }';
  document.head.appendChild(style);

  window.checkNow = function (btn, url) {
    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = 'Checking…';

    showToast('checking', 'Checking for new leads…', null);

    fetch(url, {
      method: 'POST',
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
    })
      .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, data: d }; }); })
      .then(function (res) {
        btn.disabled = false;
        btn.textContent = originalText;

        if (!res.ok || res.data.error) {
          showToast('error', 'Check failed', res.data.error || 'An unexpected error occurred.');
          return;
        }

        const assigned = res.data.assigned || 0;
        const errors   = res.data.errors   || 0;

        if (assigned === 0) {
          const sub = errors ? errors + ' error(s) — check server logs.' : 'Refreshing\u2026';
          showToast('none', 'No new leads found.', sub);
        } else {
          const plural = assigned === 1 ? 'lead' : 'leads';
          showToast('success',
            assigned + ' new ' + plural + ' found and assigned.',
            'Refreshing\u2026'
          );
        }
        // Always reload so "Last Checked" timestamp updates
        setTimeout(function () { window.location.reload(); }, 1500);
      })
      .catch(function (err) {
        btn.disabled = false;
        btn.textContent = originalText;
        showToast('error', 'Check failed', err.message || 'Network error.');
      });
  };
})();
</script>
