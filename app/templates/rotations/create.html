{% extends "base.html" %}
{% block title %}New Group{% endblock %}

{% block content %}
<div class="page-header">
  <h1>New Group</h1>
  <a href="{{ url_for('main.index') }}" class="btn btn-outline btn-sm">Cancel</a>
</div>

<div class="card">
  <form method="post">
    <div class="form-group">
      <label for="name">Group name</label>
      <input type="text" id="name" name="name" placeholder="e.g. Sales Team Round Robin"
             value="{{ request.form.get('name', '') }}" required>
    </div>

    <div class="form-group">
      <label for="description">Description <span class="text-muted">(optional)</span></label>
      <textarea id="description" name="description" rows="2"
                placeholder="What is this group for?">{{ request.form.get('description', '') }}</textarea>
    </div>

    <div class="divider"></div>

    {% include "rotations/_member_picker.html" %}

    <div style="display:flex; justify-content:flex-end; gap:.75rem; margin-top:1.5rem;">
      <a href="{{ url_for('main.index') }}" class="btn btn-outline">Cancel</a>
      <button type="submit" class="btn btn-primary">Create group</button>
    </div>
  </form>
</div>
{% endblock %}
