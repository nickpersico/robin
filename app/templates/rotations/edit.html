{% extends "base.html" %}
{% block title %}Edit {{ rotation.name }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Edit Group</h1>
  <a href="{{ url_for('rotations.view_rotation', rotation_id=rotation.id) }}" class="btn btn-outline btn-sm">Cancel</a>
</div>

<div class="card">
  <form method="post">

    {# ── Basic info ── #}
    <div class="form-group">
      <label for="name">Group name</label>
      <input type="text" id="name" name="name" value="{{ request.form.get('name', rotation.name) }}" required>
    </div>

    <div class="form-group">
      <label for="description">Description <span class="text-muted">(optional)</span></label>
      <textarea id="description" name="description" rows="2">{{ request.form.get('description', rotation.description or '') }}</textarea>
    </div>

    <div class="divider"></div>

    {# ── Members ── #}
    {% include "rotations/_member_picker.html" %}

    <div style="display:flex; justify-content:flex-end; gap:.75rem; margin-top:1.5rem;">
      <a href="{{ url_for('rotations.view_rotation', rotation_id=rotation.id) }}" class="btn btn-outline">Cancel</a>
      <button type="submit" class="btn btn-primary">Save changes</button>
    </div>

  </form>
</div>
{% endblock %}
